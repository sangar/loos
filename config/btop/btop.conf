# Btop configuration file
# Catppuccin Mocha theme for loOS

# Color theme (match with kitty/foot terminal)
color_theme = "catppuccin-mocha"

# Default update rate in milliseconds
theme[main_bg] = "#1e1e2e"
theme[main_fg] = "#cdd6f4"
theme[title] = "#cba6f7"
theme[hi_fg] = "#f38ba8"
theme[selected_bg] = "#45475a"
theme[selected_fg] = "#cdd6f4"
theme[inactive_fg] = "#6c7086"
theme[proc_misc] = "#a6e3a1"
theme[cpu_box] = "#7aa2f7"
theme[mem_box] = "#cba6f7"
theme[net_box] = "#f9e2af"
theme[proc_box] = "#89b4fa"
theme[div_line] = "#313244"

# CPU graph colors
theme[cpu_start] = "#7aa2f7"
theme[cpu_mid] = "#89dceb"
theme[cpu_end] = "#f5c2e7"

# Memory graph colors
theme[mem_start] = "#cba6f7"
theme[mem_mid] = "#f5c2e7"
theme[mem_end] = "#f38ba8"

# Process box
proc_sorting = "cpu"
proc_tree = False
proc_colors = True
proc_gradient = True

# Network
net_sync = False
net_auto = True
net_iface = ""

# Disks
shown_disks = ["/", "/home"]
disk_free_priv = False

# Update ms
update_ms = 1000

# Presets
presets = "cpu:0:default,mem:0:default,net:0:default,proc:0:default"

# Vim keys
vim_keys = True

# Rounded corners
rounded_corners = True

# Graph symbols
graph_symbol = "braille"
graph_symbol_cpu = "default"
graph_symbol_net = "default"

# Show boxes
show_cpu = True
show_mem = True
show_net = True
show_proc = True
show_disks = True

# Clock
clock_format = "%H:%M"
