# Foot terminal configuration
# A lightweight Wayland-native terminal
#
# NOTE: Foot does NOT have a keyboard layout setting.
# Keyboard layout is inherited from the Wayland compositor (Hyprland).
# Set your layout in Hyprland config: ~/.config/hypr/hyprland.conf
#   input { kb_layout = us }

# Font
font=JetBrainsMono Nerd Font:size=11

# Window settings
# Size in characters (will be adjusted to pixels)
initial-window-size-chars=100x30
pad=8x8

# Terminal bell
bell=none

# Scrollback
scrollback-lines=10000

# Colors (Catppuccin Mocha inspired)
# Background
background=1e1e2e

# Foreground (text)
foreground=cdd6f4

# Cursor
cursor-color=cdd6f4
cursor-style=block
cursor-blink=yes

# Selection
selection-foreground=1e1e2e
selection-background=b4befc

# Regular colors
regular0=45475a  # black
regular1=f38ba8  # red
regular2=a6e3a1  # green
regular3=f9e2af  # yellow
regular4=89b4fa  # blue
regular5=f5c2e7  # magenta
regular6=94e2d5  # cyan
regular7=bac2de  # white

# Bright colors
bright0=585b70   # bright black
bright1=f38ba8   # bright red
bright2=a6e3a1   # bright green
bright3=f9e2af   # bright yellow
bright4=89b4fa   # bright blue
bright5=f5c2e7   # bright magenta
bright6=94e2d5   # bright cyan
bright7=a6adc8   # bright white

# URLs
# Enable URL launching
url-launch=ctrl+shift+o

# Mouse
mouse-hide-while-typing=yes

# Key bindings (similar to kitty/alacritty)
# Copy/paste
[scrollback]
# Search in scrollback
search-bind=ctrl+shift+f

[cursor]
# Change cursor style
style=direction-key

[key-bindings]
# Scrollback
scrollback-up-page=shift+page_up
scrollback-down-page=shift+page_down
scrollback-up-line=shift+up
scrollback-down-line=shift+down

# URL
show-urls-launch=ctrl+shift+o
show-urls-copy=ctrl+shift+c

# Clipboard
clipboard-copy=ctrl+shift+c
clipboard-paste=ctrl+shift+v
primary-paste=shift+insert

# Spawn new terminal
spawn-terminal=ctrl+shift+n

# Quit
quit=ctrl+shift+q

# Font size
font-increase=ctrl+plus
font-decrease=ctrl+minus
font-reset=ctrl+0
