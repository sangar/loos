[main]
font=JetBrainsMono Nerd Font:size=16
initial-window-size=1000x600
pad=8x8
bell=none
scrollback-lines=10000
background=1e1e2e
foreground=cdd6f4
cursor-color=cdd6f4
cursor-style=block
cursor-blink=yes
selection-foreground=1e1e2e
selection-background=b4befc
regular0=45475a
regular1=f38ba8
regular2=a6e3a1
regular3=f9e2af
regular4=89b4fa
regular5=f5c2e7
regular6=94e2d5
regular7=bac2de
mouse-hide-while-typing=yes

[scrollback]
search=Control+Shift+f

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
scrollback-up-line=Shift+Up
scrollback-down-line=Shift+Down
show-urls-launch=Control+Shift+o
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
primary-paste=Shift+Insert
spawn-terminal=Control+Shift+n
quit=Control+Shift+q
font-increase=Control+plus
font-decrease=Control+minus
font-reset=Control+0

[search-bindings]
cancel=Escape
commit=Return
find-next=Control+n
find-prev=Control+Shift+n
