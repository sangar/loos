# loOS Hyprland Configuration
# This is a modular configuration - edit user configs, not these defaults
# Learn more: https://wiki.hyprland.org/Configuring/

env = WLR_RENDERER,gles2
env = HYPRLAND_NO_VULKAN,1
env = WLR_NO_HARDWARE_CURSORS,1
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Load loOS system defaults (DO NOT EDIT - managed by loOS)
# These files are in ~/.local/share/loos/default/hypr/ and updated by loos-refresh-hypr
source = ~/.local/share/loos/default/hypr/autostart.conf
source = ~/.local/share/loos/default/hypr/monitors.conf
source = ~/.local/share/loos/default/hypr/input.conf
source = ~/.local/share/loos/default/hypr/looknfeel.conf
source = ~/.local/share/loos/default/hypr/bindings.conf
source = ~/.local/share/loos/default/hypr/windows.conf

# Raspberry Pi 5 performance optimizations
#source = ~/.local/share/loos/default/hypr/pi5-performance.conf

# User customizations (EDIT THESE FILES for your own settings)
# These are created once and won't be overwritten by updates
source = ~/.config/hypr/user-monitors.conf
source = ~/.config/hypr/user-input.conf
source = ~/.config/hypr/user-looknfeel.conf
source = ~/.config/hypr/user-bindings.conf
source = ~/.config/hypr/user-autostart.conf

# Add any other personal Hyprland configuration below
# windowrule = workspace 5, match:class qemu
