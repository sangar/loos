# Environment variables for Raspberry Pi 5/500/500+ GPU performance
# Sourced by Hyprland via environment.d

# ============================================
# MESA/V3D driver settings for VideoCore VII
# ============================================

# Enable V3D-specific optimizations (if available in Mesa)
# MESA_GL_VERSION_OVERRIDE=4.5
# MESA_GLSL_VERSION_OVERRIDE=450

# Disable GPU memory overcommit protection (can help on systems with limited VRAM)
# MESA_V3D_ALLOW_PREEMPT=1

# Disable explicit sync if causing issues (try both ways)
# MESA_V3D_EXPLICIT_SYNC=disabled

# ============================================
# Hyprland/Wayland optimizations
# ============================================

# Hint to use GLES instead of GL (may help on embedded)
# LIBGL_ALWAYS_SOFTWARE=0

# Force Wayland backend for SDL apps
SDL_VIDEODRIVER=wayland

# Force Wayland for Qt apps
QT_QPA_PLATFORM=wayland

# Disable Qt text rendering workaround (improves performance)
QT_QUICK_BACKEND=software

# ============================================
# Memory/GPU optimizations
# ============================================

# Reduce shader cache to save memory
MESA_SHADER_CACHE_MAX_SIZE=512MB

# GSK_RENDERER (for GTK4 apps) - use software for consistency or GL for performance
GSK_RENDERER=gl

# ============================================
# VAAPI/Video acceleration (if installed)
# ============================================

# Enable V3D video decode if available
LIBVA_DRIVER_NAME=v3d
# OR try software for compatibility
# LIBVA_DRIVER_NAME=mesa
