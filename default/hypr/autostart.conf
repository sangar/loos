# loOS Autostart Configuration
# Default applications and services to start with Hyprland

# AGS - Aylur's GTK Shell v3 (replaces Waybar)
# GTK4-native status bar with fractional scaling support
exec-once = ags > /tmp/ags.log 2>&1 &

# Theme - restore last theme on login (applies to foot, rofi, ags)
exec-once = ~/.local/share/loos/bin/loos-theme-apply-on-login

# Wallpaper - set on startup (restores last wallpaper or random)
exec-once = loos-wallpaper init

# Background settings - apply transparency/etc on login
exec-once = loos-background apply

# Portal, polkit, clipboard - added by install/config/hyprland.sh
# These will be appended during installation:
# exec-once = dbus-update-activation-environment ...
# exec-once = xdg-desktop-portal-wlr
# exec-once = wl-clipboard history
# exec-once = hyprpolkitagent
