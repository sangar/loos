# loOS Autostart Configuration
# Default applications and services to start with Hyprland

# Waybar - status bar
exec-once = waybar > /tmp/waybar.log 2>&1 &

# Walker launcher service (runs in background for instant launch)
exec-once = walker --gapplication-service > /tmp/walker.log 2>&1 &

# Portal, polkit, clipboard - added by install/config/hyprland.sh
# These will be appended during installation:
# exec-once = dbus-update-activation-environment ...
# exec-once = xdg-desktop-portal-wlr
# exec-once = wl-clipboard history
# exec-once = hyprpolkitagent
