# Performance optimizations for Raspberry Pi 5, 500, 500+
# These settings reduce GPU load while maintaining usability

# ============================================
# RENDER/OUTPUT - Disable demanding features
# ============================================

# Disable blur entirely - major performance impact on VideoCore VII
decoration:blur:enabled = false

# Disable shadows or reduce quality
decoration:shadow:enabled = false
# OR if you want minimal shadows:
# decoration:shadow:range = 2
# decoration:shadow:render_power = 1

# Disable window rounding (or set to 0)
decoration:rounding = 0

# ============================================
# ANIMATIONS - Simplify or disable
# ============================================

# Option 1: Disable all animations (maximum performance)
# animations:enabled = false

# Option 2: Keep animations but faster/simpler
animations:enabled = true
# Faster animation speed
animation:global = 1
# Simpler curves
bezier = linear, 0.0, 0.0, 1.0, 1.0
animation = windows, 1, 2, linear
animation = windowsOut, 1, 2, linear
animation = border, 1, 2, linear
animation = workspaces, 1, 2, linear

# ============================================
# GENERAL - Reduce GPU memory pressure
# ============================================

# Smaller gaps reduce compositing overhead
general:gaps_in = 2
general:gaps_out = 4

# Disable border gradients (solid colors only)
general:border_size = 1
# Use solid colors instead of gradients
col.active_border = rgba(33ccffee)
col.inactive_border = rgba(595959aa)

# ============================================
# MISC - Tweak buffer handling
# ============================================

# Reduce cursor update frequency on inactivity
# misc:cursor_zoom_factor = 1.0
# misc:cursor_zoom_initial = 0

# Disable hyprland logo background (renders less)
misc:disable_hyprland_logo = true
misc:disable_splash_rendering = true

# VRR - variable refresh rate (if monitor supports)
# Try enabling for smoother experience
# misc:vrr = 1

# ============================================
# MONITOR - Force specific settings
# ============================================

# Use exact refresh rate to avoid resampling
# monitor = ,preferred,auto,1

# Scale with software if GPU struggles
# monitor = ,preferred,auto,1.0

# ============================================
# XWAYLAND - Reduce overhead for X apps
# ============================================

# Disable xwayland scaling (use native res)
xwayland:force_zero_scaling = true

# ============================================
# DEBUG - Only enable if troubleshooting
# ============================================

# Enable damage tracking debug
# debug:damage_tracking = 2

# Show FPS counter (uncomment to debug)
# debug:overlay = true
