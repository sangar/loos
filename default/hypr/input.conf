# loOS Input Configuration
# Keyboard, mouse, and touchpad settings

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# Per-device input configurations
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs
input:touchpad {
    # disabled = true
}

# Cursor settings
# https://wiki.hyprland.org/Configuring/Variables/#cursor
input {
    # float_switch_override_focus = 0
}

# Environment variables for input
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
