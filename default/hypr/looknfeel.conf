# loOS Look & Feel Configuration
# Appearance, decorations, animations, and general settings

general {
    # Window gaps
    gaps_in = 5
    gaps_out = 10

    border_size = 1

    # Border colors (gradient)
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true to enable resizing windows by clicking and dragging on borders
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before turning this on
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 7

    # Transparency
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true # Master switch for pseudotiling
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable anime mascot wallpapers
    # disable_hyprland_logo = false # If true disables the random hyprland logo
}
